{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center my-4">
    <div class="col-md-5 card p-4 shadow rounded-3">
        <h3 class="fw-bold text-center text-primary">📝 အကောင့်အသစ်ဖွင့်ရန်</h3>
        <form method="POST" class="mt-3">
            <div class="mb-3"><label class="form-label">Username</label><input type="text" name="username" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">ဖုန်းနံပါတ်</label><input type="text" name="phone_number" class="form-control" placeholder="09xxxxxxxxx" required></div>
            <div class="mb-3"><label class="form-label">နေရပ်လိပ်စာအပြည့်အစုံ</label><textarea name="address" class="form-control" rows="3" required></textarea></div>
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">အကောင့်ဆောက်မည်</button>
        </form>
    </div>
</div>
{% endblock %}
