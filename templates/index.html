{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4 fw-bold">📱 ရရှိနိုင်သော ဖုန်းများ</h2>
<div class="row">
    {% for phone in phones %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm rounded-3 overflow-hidden">
            <img src="{{ url_for('static', filename='uploads/' + phone.image_file) }}" class="card-img-top" style="height: 230px; object-fit: cover;">
            <div class="card-body d-flex flex-column">
                <h5 class="fw-bold">{{ phone.name }}</h5>
                <span class="badge bg-light text-secondary border align-self-start mb-3">{{ phone.category }}</span>
                <p class="text-danger h4 fw-bold">{{ phone.price }} MMK</p>
                <p class="text-muted small">လက်ကျန်: {{ phone.stock }} လုံး</p>
                <div class="mt-auto">
                    {% if phone.status == 'Sold Out' %}
                        <button class="btn btn-danger w-100" disabled>❌ Sold Out</button>
                    {% else %}
                        <a href="{{ url_for('buy_phone', phone_id=phone.id) }}" class="btn btn-success w-100 fw-bold">🛒 ဝယ်ယူမည်</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
